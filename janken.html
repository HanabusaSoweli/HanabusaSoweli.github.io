<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>じゃんけん生態系シミュレーター (重み設定版)</title>
    <style>
        body {
            margin: 0;
            background-color: #222;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        #container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        canvas {
            border: 2px solid #555;
            background-color: #111;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            cursor: crosshair;
        }
        #controls {
            background-color: #333;
            padding: 12px 20px;
            border-radius: 8px;
            display: flex;
            gap: 20px;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        .slider-group {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            font-size: 13px;
        }
        .slider-group label {
            margin-bottom: 4px;
            display: flex;
            justify-content: space-between;
            width: 100%;
        }
        .slider-group input {
            width: 120px;
        }
        #rockWeight { accent-color: #ff4a4a; }
        #scissorsWeight { accent-color: #4aff4a; }
        #paperWeight { accent-color: #4a4aff; }

        button {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 8px 16px;
            font-size: 14px;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #c0392b;
        }
        #info {
            font-size: 13px;
            text-align: center;
            line-height: 1.4;
            color: #ccc;
        }
        .count-badge {
            font-weight: bold;
            color: #f1c40f;
        }
    </style>
</head>
<body>

    <div id="container">
        <h2 style="margin: 0;">じゃんけん生態系シミュレーター</h2>
        
        <div id="controls">
            <div class="slider-group">
                <label>✊ グー (赤): <span id="rockVal">50</span></label>
                <input type="range" id="rockWeight" min="0" max="100" value="50">
            </div>
            <div class="slider-group">
                <label>✌️ チョキ (緑): <span id="scissorsVal">50</span></label>
                <input type="range" id="scissorsWeight" min="0" max="100" value="50">
            </div>
            <div class="slider-group">
                <label>🖐️ パー (青): <span id="paperVal">50</span></label>
                <input type="range" id="paperWeight" min="0" max="100" value="50">
            </div>
            <button id="clearBtn">クリア (全消去)</button>
        </div>

        <canvas id="simCanvas" width="800" height="500"></canvas>
        
        <div id="info">
            【操作方法】スライダーで出現させたい手の「重み（0〜100）」を決め、<strong style="color: #fff;">黒い画面をクリック</strong>して配置してください。<br>
            現在の個体数: <span id="creatureCount" class="count-badge">0</span> 体 | 
            赤: グー多め / 緑: チョキ多め / 青: パー多め
        </div>
    </div>

    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');

        // UI要素
        const rockSlider = document.getElementById('rockWeight');
        const scissorsSlider = document.getElementById('scissorsWeight');
        const paperSlider = document.getElementById('paperWeight');
        const rockVal = document.getElementById('rockVal');
        const scissorsVal = document.getElementById('scissorsVal');
        const paperVal = document.getElementById('paperVal');
        const clearBtn = document.getElementById('clearBtn');
        const countBadge = document.getElementById('creatureCount');

        const MUTATION_RATE = 0.05; // 突然変異確率 (5%)
        const MUTATION_AMOUNT = 0.1; // 突然変異時の変化量 (10%)
        const INFLUENCE_RATE = 0.15; // 敗者が勝者に染まる割合 (15%)
        const SPEED_MULT = 0.25; // 速度1/4倍

        class Creature {
            constructor(x, y, r, s, p) {
                this.x = x;
                this.y = y;
                this.radius = 8;
                this.mass = 1;
                
                const angle = Math.random() * Math.PI * 2;
                const speed = (1 + Math.random() * 2) * SPEED_MULT; 
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;

                this.genes = { rock: r, scissors: s, paper: p };
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;

                if (this.x - this.radius < 0) {
                    this.x = this.radius;
                    this.vx *= -1;
                }
                if (this.x + this.radius > canvas.width) {
                    this.x = canvas.width - this.radius;
                    this.vx *= -1;
                }
                if (this.y - this.radius < 0) {
                    this.y = this.radius;
                    this.vy *= -1;
                }
                if (this.y + this.radius > canvas.height) {
                    this.y = canvas.height - this.radius;
                    this.vy *= -1;
                }
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                
                const red = Math.floor(this.genes.rock * 255);
                const green = Math.floor(this.genes.scissors * 255);
                const blue = Math.floor(this.genes.paper * 255);
                
                ctx.fillStyle = `rgb(${red}, ${green}, ${blue})`;
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 1;
                ctx.stroke();
                ctx.closePath();
            }

            decideHand() {
                const rand = Math.random();
                if (rand < this.genes.rock) {
                    return 'rock';
                } else if (rand < this.genes.rock + this.genes.scissors) {
                    return 'scissors';
                } else {
                    return 'paper';
                }
            }

            mutate() {
                const keys = ['rock', 'scissors', 'paper'];
                const loseAttr = keys[Math.floor(Math.random() * keys.length)];
                let gainAttr;
                do {
                    gainAttr = keys[Math.floor(Math.random() * keys.length)];
                } while (gainAttr === loseAttr);

                const actualN = Math.min(MUTATION_AMOUNT, this.genes[loseAttr]);
                this.genes[loseAttr] -= actualN;
                this.genes[gainAttr] += actualN;
            }
        }

        const creatures = [];

        // --- 修正点: ％変換を行わず、スライダーの値をそのまま表示 ---
        function updateSliderLabels() {
            rockVal.textContent = rockSlider.value;
            scissorsVal.textContent = scissorsSlider.value;
            paperVal.textContent = paperSlider.value;
        }

        [rockSlider, scissorsSlider, paperSlider].forEach(slider => {
            slider.addEventListener('input', updateSliderLabels);
        });

        // 初期表示
        updateSliderLabels();

        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            const rW = parseFloat(rockSlider.value);
            const sW = parseFloat(scissorsSlider.value);
            const pW = parseFloat(paperSlider.value);
            let sum = rW + sW + pW;

            let r, s, p;
            if (sum === 0) {
                // 全て0の時は等倍
                r = s = p = 1/3;
            } else {
                r = rW / sum;
                s = sW / sum;
                p = pW / sum;
            }

            creatures.push(new Creature(x, y, r, s, p));
            countBadge.textContent = creatures.length;
        });

        clearBtn.addEventListener('click', () => {
            creatures.length = 0;
            countBadge.textContent = 0;
        });

        function playJanken(hand1, hand2) {
            if (hand1 === hand2) return 0;
            if (
                (hand1 === 'rock' && hand2 === 'scissors') ||
                (hand1 === 'scissors' && hand2 === 'paper') ||
                (hand1 === 'paper' && hand2 === 'rock')
            ) {
                return 1;
            }
            return -1;
        }

        function handleCollisions() {
            for (let i = 0; i < creatures.length; i++) {
                for (let j = i + 1; j < creatures.length; j++) {
                    const c1 = creatures[i];
                    const c2 = creatures[j];

                    const dx = c2.x - c1.x;
                    const dy = c2.y - c1.y;
                    const distance = Math.hypot(dx, dy);
                    const minDist = c1.radius + c2.radius;

                    if (distance < minDist) {
                        const nx = dx / distance;
                        const ny = dy / distance;
                        const rvx = c2.vx - c1.vx;
                        const rvy = c2.vy - c1.vy;
                        const velAlongNormal = rvx * nx + rvy * ny;

                        if (velAlongNormal < 0) {
                            const restitution = 1.0;
                            let jImpulse = -(1 + restitution) * velAlongNormal;
                            jImpulse /= (2);

                            const impulseX = jImpulse * nx;
                            const impulseY = jImpulse * ny;
                            c1.vx -= impulseX;
                            c1.vy -= impulseY;
                            c2.vx += impulseX;
                            c2.vy += impulseY;
                        }

                        const overlap = (minDist - distance) / 2;
                        c1.x -= nx * overlap;
                        c1.y -= ny * overlap;
                        c2.x += nx * overlap;
                        c2.y += ny * overlap;

                        const hand1 = c1.decideHand();
                        const hand2 = c2.decideHand();
                        const result = playJanken(hand1, hand2);

                        if (result === 1) {
                            absorb(c1, c2);
                        } else if (result === -1) {
                            absorb(c2, c1);
                        }

                        if (Math.random() < MUTATION_RATE) c1.mutate();
                        if (Math.random() < MUTATION_RATE) c2.mutate();
                    }
                }
            }
        }

        function absorb(winner, loser) {
            for (const key in loser.genes) {
                loser.genes[key] += (winner.genes[key] - loser.genes[key]) * INFLUENCE_RATE;
            }
            const sum = loser.genes.rock + loser.genes.scissors + loser.genes.paper;
            loser.genes.rock /= sum;
            loser.genes.scissors /= sum;
            loser.genes.paper /= sum;
        }

        function loop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            creatures.forEach(c => {
                c.update();
                c.draw();
            });

            handleCollisions();

            requestAnimationFrame(loop);
        }

        loop();
    </script>
</body>
</html>
