<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>じゃんけん生態系シミュレーター (カスタムハンド版)</title>
    <style>
        body {
            margin: 0;
            background-color: #222;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        #container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            width: 95%;
            max-width: 1100px;
        }
        
        /* 左右レイアウト用ラッパー */
        #main-area {
            display: flex;
            gap: 15px;
            width: 100%;
            justify-content: center;
            align-items: stretch;
        }

        canvas {
            border: 2px solid #555;
            background-color: #111;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            cursor: crosshair;
        }

        /* 右側：ステータスパネル */
        #statusPanel {
            width: 260px;
            background-color: #2c2c2c;
            border: 2px solid #555;
            border-radius: 8px;
            padding: 15px;
            box-sizing: border-box;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        #statusPanel h3 {
            margin: 0 0 5px 0;
            padding-bottom: 8px;
            border-bottom: 1px solid #555;
            color: #f1c40f;
            font-size: 15px;
            text-align: center;
        }
        
        /* ハイライト切り替え用のUI */
        #highlightConfig {
            background-color: #1e1e1e;
            border-radius: 6px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            font-size: 11px;
            border: 1px solid #444;
        }
        .highlight-title {
            color: #f1c40f;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .radio-group {
            display: flex;
            gap: 12px;
        }
        .radio-label {
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            user-select: none;
            color: #ccc;
        }
        .radio-label input {
            margin: 0;
            cursor: pointer;
        }

        .status-placeholder {
            color: #888;
            text-align: center;
            margin-top: auto;
            margin-bottom: auto;
            font-size: 12px;
            line-height: 1.6;
        }
        .status-item {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            border-bottom: 1px dashed #444;
            padding-bottom: 4px;
        }
        .status-item span:last-child {
            font-weight: bold;
        }

        /* 遺伝子バーのビジュアル */
        .gene-bar-container {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-top: 5px;
            max-height: 160px;
            overflow-y: auto;
        }
        .gene-label {
            font-size: 11px;
            color: #aaa;
        }
        .gene-bar {
            height: 14px;
            border-radius: 3px;
            position: relative;
            background-color: #111;
            overflow: hidden;
            min-height: 14px;
        }
        .gene-fill {
            height: 100%;
            width: 0%;
            transition: width 0.2s;
        }

        #controls {
            background-color: #333;
            padding: 12px 20px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            width: 100%;
            box-sizing: border-box;
        }
        
        .control-grid {
            display: flex;
            gap: 20px;
            width: 100%;
            justify-content: center;
        }
        .control-column {
            display: flex;
            flex-direction: column;
            gap: 8px;
            border-right: 1px solid #555;
            padding-right: 20px;
            position: relative; /* 子要素の絶対配置基準用 */
        }
        .control-column:last-of-type {
            border-right: none;
            padding-right: 0;
        }

        .slider-group {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            font-size: 11px;
            width: 250px;
        }
        .slider-group label {
            margin-bottom: 4px;
            font-weight: bold;
        }
        
        .input-row {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
        }
        .input-row input[type="range"] {
            flex: 1;
            min-width: 0;
        }
        .input-row input[type="number"] {
            width: 45px;
            min-width: 45px;
            background-color: #444;
            color: #fff;
            border: 1px solid #666;
            border-radius: 4px;
            padding: 3px;
            font-size: 11px;
            text-align: center;
            box-sizing: border-box;
        }

        .control-bottom {
            display: flex;
            width: 100%;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #444;
            padding-top: 10px;
        }

        #speed-control {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        #speed-control span {
            font-size: 13px;
            font-weight: bold;
            margin-right: 6px;
            color: #bbb;
        }
        .speed-btn {
            background-color: #444;
            color: #ccc;
            border: 1px solid #555;
            padding: 6px 12px;
            font-size: 12px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .speed-btn:hover {
            background-color: #555;
            color: #fff;
        }
        .speed-btn.active {
            background-color: #3498db;
            color: #fff;
            border-color: #2980b9;
            font-weight: bold;
        }

        #decayInterval { accent-color: #f39c12; }
        #mutRate { accent-color: #9b59b6; }
        #mutAmt { accent-color: #1abc9c; }

        button#clearBtn {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 8px 18px;
            font-size: 14px;
            border-radius: 4px;
            cursor: pointer;
        }
        button#clearBtn:hover {
            background-color: #c0392b;
        }
        #info {
            font-size: 12px;
            text-align: center;
            line-height: 1.4;
            color: #ccc;
        }
        .count-badge {
            font-weight: bold;
            color: #f1c40f;
        }
    </style>
</head>
<body>

    <div id="container">
        <h2 style="margin: 0;">じゃんけん生態系シミュレーター (カスタムハンド版)</h2>
        
        <div id="controls">
            <div class="control-grid">
                
                <div class="control-column" style="width: 280px;">
                    <h4 style="margin: 0 0 6px 0; color: #f1c40f; font-size: 13px;">✋ 手のマスターリスト</h4>
                    <div id="handListContainer" style="display: flex; flex-direction: column; gap: 4px; height: 110px; overflow-y: auto; background: #1e1e1e; padding: 6px; border-radius: 4px; border: 1px solid #444;">
                        </div>
                    <button id="showAddHandFormBtn" style="margin-top: 6px; font-size: 11px; padding: 5px; background: #3498db; color: #fff; border: none; border-radius: 4px; cursor: pointer; width: 100%; font-weight: bold;">＋ 新しい手を追加</button>
                    
                    <div id="addHandForm" style="display: none; background: #2c2c2c; border: 2px solid #555; padding: 10px; border-radius: 6px; font-size: 11px; flex-direction: column; gap: 8px; position: absolute; z-index: 20; width: 260px; top: 10px; left: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.6);">
                        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #555; padding-bottom: 4px;">
                            <strong style="color: #3498db;">🖐️ 手の追加登録</strong>
                            <button id="closeAddHandFormBtn" style="background: none; border: none; color: #aaa; cursor: pointer; font-size: 14px;">✕</button>
                        </div>
                        <div style="display: flex; gap: 6px; align-items: center;">
                            <input type="text" id="newHandName" placeholder="例: ⚡ 雷" style="flex: 1; background: #111; color: #fff; border: 1px solid #555; border-radius: 4px; padding: 4px; font-size: 11px; box-sizing: border-box;">
                            <input type="color" id="newHandColor" value="#e74c3c" style="width: 28px; height: 24px; border: none; padding: 0; background: none; cursor: pointer;">
                        </div>
                        <div>
                            <span style="color: #aaa; font-weight: bold;">既存の手との相性（新手から見て）:</span>
                            <div id="beatsCheckboxes" style="display: flex; flex-direction: column; gap: 4px; max-height: 120px; overflow-y: auto; background: #111; padding: 6px; border-radius: 4px; margin-top: 4px; border: 1px solid #444;">
                                </div>
                        </div>
                        <button id="submitAddHandBtn" style="background: #2ecc71; color: #fff; border: none; border-radius: 4px; padding: 6px; cursor: pointer; font-weight: bold; font-size: 11px;">登録を確定</button>
                    </div>
                </div>

                <div class="control-column" id="dynamicSlidersColumn" style="width: 280px;">
                    <h4 style="margin: 0 0 6px 0; color: #f1c40f; font-size: 13px;">🧬 誕生時の初期遺伝子比率</h4>
                    <div id="dynamicSlidersContainer" style="display: flex; flex-direction: column; gap: 6px; height: 140px; overflow-y: auto; padding-right: 5px;">
                        </div>
                </div>

                <div class="control-column" style="width: 280px;">
                    <h4 style="margin: 0 0 6px 0; color: #f1c40f; font-size: 13px;">⚙️ 環境・進化設定</h4>
                    <div class="slider-group" style="width: 100%;">
                        <label>⏳ 基準HP減少間隔 (秒)</label>
                        <div class="input-row">
                            <input type="range" id="decayInterval" min="1" max="300" value="120">
                            <input type="number" id="decayNum" min="1" max="300" value="120">
                        </div>
                    </div>
                    <div class="slider-group" style="width: 100%; margin-top: 4px;">
                        <label>⚡ 分裂時変異率 (%)</label>
                        <div class="input-row">
                            <input type="range" id="mutRate" min="0" max="100" value="5">
                            <input type="number" id="mutRateNum" min="0" max="100" value="5">
                        </div>
                    </div>
                    <div class="slider-group" style="width: 100%; margin-top: 4px;">
                        <label>🔮 変異変化幅 (%)</label>
                        <div class="input-row">
                            <input type="range" id="mutAmt" min="1" max="50" value="10">
                            <input type="number" id="mutAmtNum" min="1" max="50" value="10">
                        </div>
                    </div>
                </div>
            </div>

            <div class="control-bottom">
                <div id="speed-control">
                    <span>⏱️ 時間速度:</span>
                    <button class="speed-btn" data-speed="0">0倍 (停止)</button>
                    <button class="speed-btn" data-speed="0.25">1/4倍</button>
                    <button class="speed-btn" data-speed="0.5">1/2倍</button>
                    <button class="speed-btn active" data-speed="1">1倍 (標準)</button>
                    <button class="speed-btn" data-speed="2">2倍</button>
                    <button class="speed-btn" data-speed="4">4倍</button>
                </div>
                <button id="clearBtn">クリア</button>
            </div>
        </div>

        <div id="main-area">
            <canvas id="simCanvas" width="800" height="480"></canvas>
            
            <div id="statusPanel">
                <h3>🧬 個体ステータス</h3>
                
                <div id="highlightConfig">
                    <div class="highlight-title">💡 ハイライト対象</div>
                    <div class="radio-group">
                        <label class="radio-label">
                            <input type="radio" name="highlightMode" value="5degrees" checked> 5親等以内
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="highlightMode" value="all"> 一族全員
                        </label>
                    </div>
                </div>

                <div id="statusContent" style="display: flex; flex-direction: column; gap: 10px; height: 100%;">
                    <div class="status-placeholder">
                        生き物にカーソルを合わせると<br>詳細なステータスと<br>指定した範囲の親戚達が<br>ぼんやり光り輝きます。
                    </div>
                </div>
            </div>
        </div>
        
        <div id="info">
            【操作方法】設定を行い、<strong style="color: #fff;">画面をクリックして配置</strong>してください。<br>
            現在の個体数: <span id="creatureCount" class="count-badge">0</span> 体 | 
            <span style="color: #1abc9c; font-weight: bold;">※ 周囲（半径150px）に他個体が多いと密状態になりHP減少が加速します（50体で4倍速）。</span>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');

        const clearBtn = document.getElementById('clearBtn');
        const countBadge = document.getElementById('creatureCount');

        const decayIntervalSlider = document.getElementById('decayInterval');
        const mutRateSlider = document.getElementById('mutRate');
        const mutAmtSlider = document.getElementById('mutAmt');
        
        const statusContent = document.getElementById('statusContent');
        const highlightRadios = document.getElementsByName('highlightMode');

        // 手の追加フォーム関連UI
        const addHandForm = document.getElementById('addHandForm');
        const showAddHandFormBtn = document.getElementById('showAddHandFormBtn');
        const closeAddHandFormBtn = document.getElementById('closeAddHandFormBtn');
        const submitAddHandBtn = document.getElementById('submitAddHandBtn');
        const newHandName = document.getElementById('newHandName');
        const newHandColor = document.getElementById('newHandColor');
        const beatsCheckboxes = document.getElementById('beatsCheckboxes');
        const handListContainer = document.getElementById('handListContainer');
        const dynamicSlidersContainer = document.getElementById('dynamicSlidersContainer');

        const SPEED_MULT = 0.25; 
        let timeScale = 1.0; 

        // --- 動的に増減可能なじゃんけんの手のマスターデータ ---
        let hands = [
            { id: 'rock', name: '✊ グー', color: '#ff4a4a', beats: ['scissors'] },
            { id: 'scissors', name: '✌️ チョキ', color: '#4aff4a', beats: ['paper'] },
            { id: 'paper', name: '🖐️ パー', color: '#4a4aff', beats: ['rock'] }
        ];

        // --- 家系・ID管理システム ---
        let familyCounter = 0;
        let creatureIdCounter = 0;

        // 家系関係を保持する無向グラフ (Map: creatureId -> Set of connected creatureIds)
        const familyGraph = new Map();

        // マウス座標＆ホバー中の個体管理
        let mouseX = -9999;
        let mouseY = -9999;
        let hoveredCreature = null;

        // --- カラーブレンド用のヘルパー関数 (16進数 -> RGB) ---
        function hexToRgb(hex) {
            let shorthandRegex = /^#?([a-f\d])([a-f\d])([a-f\d])$/i;
            hex = hex.replace(shorthandRegex, function(m, r, g, b) {
                return r + r + g + g + b + b;
            });
            let result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            } : { r: 255, g: 255, b: 255 };
        }

        class Creature {
            constructor(x, y, genes, familyId, parentId = null) {
                this.id = ++creatureIdCounter; // ユニークID
                
                this.x = x;
                this.y = y;
                this.radius = 8;
                this.mass = 1;
                
                const angle = Math.random() * Math.PI * 2;
                const speed = (1 + Math.random() * 2) * SPEED_MULT; 
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;

                // 遺伝子配列のディープコピー（登録されていない手は0で初期化）
                this.genes = {};
                hands.forEach(h => {
                    this.genes[h.id] = genes[h.id] !== undefined ? genes[h.id] : 0;
                });

                // 合計が確実に1になるよう、作成時に正規化
                let sum = 0;
                hands.forEach(h => sum += this.genes[h.id]);
                if (sum > 0) {
                    hands.forEach(h => this.genes[h.id] /= sum);
                } else {
                    hands.forEach(h => this.genes[h.id] = 1 / hands.length);
                }

                this.hp = 10;
                this.simulatedAge = 0;       
                this.decayAccumulator = 0; 

                this.familyId = familyId || `家系 #${++familyCounter}`;

                // 親子関係を家系グラフに登録
                familyGraph.set(this.id, new Set());
                if (parentId && familyGraph.has(parentId)) {
                    familyGraph.get(parentId).add(this.id);
                    familyGraph.get(this.id).add(parentId);
                }

                this.lastNeighborCount = 0;
                this.lastMultiplier = 1.0;
            }

            isInvincible() {
                return this.simulatedAge < 1500; 
            }

            update(simDt, allCreatures) {
                this.x += this.vx * timeScale;
                this.y += this.vy * timeScale;

                if (this.x - this.radius < 0) {
                    this.x = this.radius;
                    this.vx *= -1;
                }
                if (this.x + this.radius > canvas.width) {
                    this.x = canvas.width - this.radius;
                    this.vx *= -1;
                }
                if (this.y - this.radius < 0) {
                    this.y = this.radius;
                    this.vy *= -1;
                }
                if (this.y + this.radius > canvas.height) {
                    this.y = canvas.height - this.radius;
                    this.vy *= -1;
                }

                this.simulatedAge += simDt;

                // 密度依存型HP減少システム
                const CROWD_RADIUS = 150; 
                let neighborCount = 0;

                for (let i = 0; i < allCreatures.length; i++) {
                    const other = allCreatures[i];
                    if (other === this) continue;
                    const dist = Math.hypot(other.x - this.x, other.y - this.y);
                    if (dist < CROWD_RADIUS) {
                        neighborCount++;
                    }
                }

                const densityMultiplier = 0.4 + neighborCount * 0.072;

                this.lastNeighborCount = neighborCount;
                this.lastMultiplier = densityMultiplier;

                this.decayAccumulator += simDt * densityMultiplier;

                const decayIntervalMs = parseFloat(decayIntervalSlider.value) * 1000;
                if (this.decayAccumulator >= decayIntervalMs) {
                    this.hp -= 1;
                    this.decayAccumulator -= decayIntervalMs; 
                }
            }

            draw(isHighlighted) {
                ctx.save();

                // 遺伝子の比率（重み）に基づき、登録カラーをRGBにブレンド
                let rSum = 0, gSum = 0, bSum = 0;
                let totalWeight = 0;

                hands.forEach(h => {
                    const weight = this.genes[h.id] || 0;
                    const rgb = hexToRgb(h.color);
                    rSum += rgb.r * weight;
                    gSum += rgb.g * weight;
                    bSum += rgb.b * weight;
                    totalWeight += weight;
                });

                if (totalWeight === 0) {
                    rSum = gSum = bSum = 255; 
                }

                const red = Math.floor(rSum);
                const green = Math.floor(gSum);
                const blue = Math.floor(bSum);
                const baseColorStr = `rgb(${red}, ${green}, ${blue})`;

                if (isHighlighted) {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius + 6, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(${red}, ${green}, ${blue}, 0.45)`; 
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = baseColorStr;
                    ctx.fill();
                    ctx.closePath();
                    ctx.shadowBlur = 0; 
                }

                const invincible = this.isInvincible();
                if (invincible) {
                    ctx.globalAlpha = 0.4; 
                }

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                
                ctx.fillStyle = baseColorStr;
                ctx.fill();
                
                ctx.strokeStyle = invincible ? '#f1c40f' : '#fff';
                ctx.lineWidth = invincible ? 1.5 : 1;
                ctx.stroke();
                ctx.closePath();

                ctx.fillStyle = invincible ? '#f1c40f' : '#ccc';
                ctx.font = '10px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(Math.round(this.hp), this.x, this.y - this.radius - 4);

                ctx.restore(); 
            }

            // 手の決定
            decideHand() {
                const rand = Math.random();
                let cumulative = 0;
                for (let i = 0; i < hands.length; i++) {
                    const h = hands[i];
                    cumulative += (this.genes[h.id] || 0);
                    if (rand < cumulative) {
                        return h.id;
                    }
                }
                return hands[hands.length - 1].id;
            }

            mutate(mutationAmount) {
                if (hands.length < 2) return;

                const activeHandIds = hands.map(h => h.id);
                const loseAttr = activeHandIds[Math.floor(Math.random() * activeHandIds.length)];
                let gainAttr;
                do {
                    gainAttr = activeHandIds[Math.floor(Math.random() * activeHandIds.length)];
                } while (gainAttr === loseAttr && activeHandIds.length > 1);

                if (!this.genes[loseAttr]) this.genes[loseAttr] = 0;
                if (!this.genes[gainAttr]) this.genes[gainAttr] = 0;

                const actualN = Math.min(mutationAmount, this.genes[loseAttr]);
                this.genes[loseAttr] -= actualN;
                this.genes[gainAttr] += actualN;

                let sum = 0;
                activeHandIds.forEach(id => sum += (this.genes[id] || 0));
                if (sum > 0) {
                    activeHandIds.forEach(id => this.genes[id] = (this.genes[id] || 0) / sum);
                }
            }
        }

        let creatures = [];

        function getSelectedHighlightMode() {
            for (const r of highlightRadios) {
                if (r.checked) return r.value;
            }
            return '5degrees';
        }

        // BFSアルゴリズムによる5親等以内の取得
        function getRelativesWithin5Degrees(startId) {
            const relatives = new Set();
            const queue = [{ id: startId, dist: 0 }];
            const visited = new Set();
            visited.add(startId);

            while (queue.length > 0) {
                const { id, dist } = queue.shift();
                relatives.add(id);

                if (dist < 5) {
                    const neighbors = familyGraph.get(id);
                    if (neighbors) {
                        for (const neighborId of neighbors) {
                            if (!visited.has(neighborId)) {
                                visited.add(neighborId);
                                queue.push({ id: neighborId, dist: dist + 1 });
                            }
                        }
                    }
                }
            }
            return relatives;
        }

        function cleanUpFamilyGraph() {
            const activeIds = new Set();
            const visited = new Set();

            for (let i = 0; i < creatures.length; i++) {
                const startId = creatures[i].id;
                if (visited.has(startId)) continue;

                const queue = [{ id: startId, dist: 0 }];
                visited.add(startId);

                while (queue.length > 0) {
                    const { id, dist } = queue.shift();
                    activeIds.add(id);

                    if (dist < 5) {
                        const neighbors = familyGraph.get(id);
                        if (neighbors) {
                            for (const neighborId of neighbors) {
                                if (!visited.has(neighborId)) {
                                    visited.add(neighborId);
                                    queue.push({ id: neighborId, dist: dist + 1 });
                                }
                            }
                        }
                    }
                }
            }

            for (const id of familyGraph.keys()) {
                if (!activeIds.has(id)) {
                    familyGraph.delete(id);
                } else {
                    const neighbors = familyGraph.get(id);
                    for (const neighborId of neighbors) {
                        if (!activeIds.has(neighborId)) {
                            neighbors.delete(neighborId);
                        }
                    }
                }
            }
        }

        // 手のマスターリストのHTML生成
        function renderHandList() {
            handListContainer.innerHTML = '';
            hands.forEach(h => {
                const div = document.createElement('div');
                div.style.display = 'flex';
                div.style.alignItems = 'center';
                div.style.justifyContent = 'space-between';
                div.style.background = '#2a2a2a';
                div.style.padding = '4px 6px';
                div.style.borderRadius = '4px';
                div.style.fontSize = '11px';

                // 相性ルールの文字列表現
                const winTargets = h.beats.map(id => {
                    const found = hands.find(item => item.id === id);
                    return found ? found.name.split(' ')[0] : ''; 
                }).filter(Boolean).join(', ');

                div.innerHTML = `
                    <div style="display: flex; align-items: center; gap: 6px; flex: 1; min-width: 0;">
                        <span style="display: inline-block; width: 10px; height: 10px; border-radius: 50%; background: ${h.color}; flex-shrink: 0;"></span>
                        <span style="font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;" title="${h.name}">${h.name}</span>
                        <span style="color: #bbb; font-size: 10px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">→ ${winTargets || 'なし'}に勝ち</span>
                    </div>
                    <button class="delete-hand-btn" data-id="${h.id}" style="background: #e74c3c; border: none; color: #fff; border-radius: 3px; padding: 1px 4px; cursor: pointer; font-size: 9px;">✕</button>
                `;
                handListContainer.appendChild(div);
            });

            document.querySelectorAll('.delete-hand-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const targetId = btn.dataset.id;
                    if (hands.length <= 3) {
                        alert("じゃんけん（すくみ）が破綻しないよう、手は最低3つ必要です！");
                        return;
                    }
                    
                    hands = hands.filter(h => h.id !== targetId);
                    hands.forEach(h => {
                        h.beats = h.beats.filter(id => id !== targetId);
                    });

                    creatures.forEach(c => {
                        delete c.genes[targetId];
                        let sum = 0;
                        hands.forEach(h => sum += (c.genes[h.id] || 0));
                        if (sum > 0) {
                            hands.forEach(h => c.genes[h.id] = (c.genes[h.id] || 0) / sum);
                        } else {
                            hands.forEach(h => c.genes[h.id] = 1 / hands.length);
                        }
                    });

                    renderHandList();
                    renderDynamicSliders();
                    updateStatusPanel();
                });
            });
        }

        function renderDynamicSliders() {
            const currentValues = {};
            hands.forEach(h => {
                const el = document.getElementById(`weight_${h.id}`);
                currentValues[h.id] = el ? el.value : 50; 
            });

            dynamicSlidersContainer.innerHTML = '';

            hands.forEach(h => {
                const val = currentValues[h.id];
                const group = document.createElement('div');
                group.className = 'slider-group';
                group.style.width = '100%';
                
                group.innerHTML = `
                    <label style="color: ${h.color};">${h.name} 初期比率</label>
                    <div class="input-row">
                        <input type="range" id="weight_${h.id}" min="0" max="100" value="${val}" style="accent-color: ${h.color};">
                        <input type="number" id="num_${h.id}" min="0" max="100" value="${val}">
                    </div>
                `;
                dynamicSlidersContainer.appendChild(group);

                const slider = document.getElementById(`weight_${h.id}`);
                const num = document.getElementById(`num_${h.id}`);

                slider.addEventListener('input', () => {
                    num.value = slider.value;
                });

                num.addEventListener('input', () => {
                    let v = parseFloat(num.value);
                    if (isNaN(v)) return;
                    if (v < 0) v = 0;
                    if (v > 100) v = 100;
                    slider.value = v;
                });

                num.addEventListener('blur', () => {
                    if (num.value === '' || isNaN(parseFloat(num.value))) {
                        num.value = slider.value;
                    } else {
                        let v = parseFloat(num.value);
                        if (v < 0) v = 0;
                        if (v > 100) v = 100;
                        num.value = v;
                    }
                });
            });
        }

        function getInitialGenes() {
            const weights = {};
            let sum = 0;
            hands.forEach(h => {
                const slider = document.getElementById(`weight_${h.id}`);
                const val = slider ? parseFloat(slider.value) : 50;
                weights[h.id] = val;
                sum += val;
            });

            if (sum === 0) {
                hands.forEach(h => weights[h.id] = 1 / hands.length);
            } else {
                hands.forEach(h => weights[h.id] /= sum);
            }
            return weights;
        }

        // --- 【新機能】新しい手と既存の手の「勝ち・負け・あいこ」ラジオ設定UIを生成 ---
        function populateRelationshipInputs() {
            beatsCheckboxes.innerHTML = '';
            
            if (hands.length === 0) {
                beatsCheckboxes.innerHTML = '<div style="color:#888; font-size:11px; text-align:center;">既存の手がありません</div>';
                return;
            }

            hands.forEach(h => {
                const row = document.createElement('div');
                row.style.display = 'flex';
                row.style.alignItems = 'center';
                row.style.justifyContent = 'space-between';
                row.style.background = '#222';
                row.style.padding = '4px 6px';
                row.style.borderRadius = '4px';
                row.style.marginBottom = '2px';

                row.innerHTML = `
                    <div style="display: flex; align-items: center; gap: 4px; width: 80px; min-width: 80px;">
                        <span style="display:inline-block; width:8px; height:8px; border-radius:50%; background:${h.color}; flex-shrink:0;"></span>
                        <span style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-weight:bold; font-size:11px;" title="${h.name}">${h.name}</span>
                    </div>
                    <div style="display: flex; gap: 6px;">
                        <label style="display:flex; align-items:center; gap:1px; cursor:pointer; color:#2ecc71; font-size:10px;">
                            <input type="radio" name="rel_${h.id}" value="win" style="margin:0; width:12px; height:12px;">勝
                        </label>
                        <label style="display:flex; align-items:center; gap:1px; cursor:pointer; color:#e74c3c; font-size:10px;">
                            <input type="radio" name="rel_${h.id}" value="lose" style="margin:0; width:12px; height:12px;">負
                        </label>
                        <label style="display:flex; align-items:center; gap:1px; cursor:pointer; color:#aaa; font-size:10px;">
                            <input type="radio" name="rel_${h.id}" value="draw" checked style="margin:0; width:12px; height:12px;">引分
                        </label>
                    </div>
                `;
                beatsCheckboxes.appendChild(row);
            });
        }

        // 手の追加登録確定処理
        submitAddHandBtn.addEventListener('click', () => {
            const name = newHandName.value.trim();
            const color = newHandColor.value;

            if (!name) {
                alert('手の名前を入力してください！(例: ⚡ 雷)');
                return;
            }

            const newId = 'hand_' + Date.now();
            const beats = [];

            // 各既存の手との関係性を読み取って、相互関係を定義
            hands.forEach(h => {
                const radio = document.querySelector(`input[name="rel_${h.id}"]:checked`);
                if (radio) {
                    const relation = radio.value;
                    if (relation === 'win') {
                        // 新手が既存の手に勝つ（新手の勝利リストに追加）
                        beats.push(h.id);
                    } else if (relation === 'lose') {
                        // 既存の手が新手に勝つ（既存側の勝利リストに新規IDを追加）
                        h.beats.push(newId);
                    }
                    // 'draw' (引き分け) の場合は、お互いの勝利リストに入れないだけで実現可能
                }
            });

            // 新手をリストに登録
            hands.push({
                id: newId,
                name: name,
                color: color,
                beats: beats
            });

            // 現在いる全ての個体の遺伝子マップに、新しく追加された手(割合0%)を追加
            creatures.forEach(c => {
                c.genes[newId] = 0;
            });

            // フォームのリセットと非表示
            newHandName.value = '';
            addHandForm.style.display = 'none';

            renderHandList();
            renderDynamicSliders();
        });

        // フォーム表示非表示制御
        showAddHandFormBtn.addEventListener('click', () => {
            populateRelationshipInputs();
            addHandForm.style.display = 'flex';
        });

        closeAddHandFormBtn.addEventListener('click', () => {
            addHandForm.style.display = 'none';
        });

        // 固定環境設定用の同期
        const inputPairs = [
            { slider: document.getElementById('decayInterval'), num: document.getElementById('decayNum') },
            { slider: document.getElementById('mutRate'), num: document.getElementById('mutRateNum') },
            { slider: document.getElementById('mutAmt'), num: document.getElementById('mutAmtNum') }
        ];

        inputPairs.forEach(pair => {
            pair.slider.addEventListener('input', () => {
                pair.num.value = pair.slider.value;
            });
            pair.num.addEventListener('input', () => {
                let val = parseFloat(pair.num.value);
                const min = parseFloat(pair.slider.min);
                const max = parseFloat(pair.slider.max);
                if (isNaN(val)) return;
                if (val < min) val = min;
                if (val > max) val = max;
                pair.slider.value = val;
            });
            pair.num.addEventListener('blur', () => {
                if (pair.num.value === '' || isNaN(parseFloat(pair.num.value))) {
                    pair.num.value = pair.slider.value;
                } else {
                    let val = parseFloat(pair.num.value);
                    const min = parseFloat(pair.slider.min);
                    const max = parseFloat(pair.slider.max);
                    if (val < min) val = min;
                    if (val > max) val = max;
                    pair.num.value = val;
                }
            });
        });

        const speedBtns = document.querySelectorAll('.speed-btn');
        speedBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                speedBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                timeScale = parseFloat(btn.dataset.speed);
            });
        });

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            mouseY = e.clientY - rect.top;
        });

        canvas.addEventListener('mouseleave', () => {
            mouseX = -9999;
            mouseY = -9999;
            hoveredCreature = null;
        });

        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            if (hoveredCreature) return;

            const initGenes = getInitialGenes();
            creatures.push(new Creature(x, y, initGenes));
            countBadge.textContent = creatures.length;
        });

        clearBtn.addEventListener('click', () => {
            creatures = [];
            countBadge.textContent = 0;
            hoveredCreature = null;
            familyCounter = 0;
            creatureIdCounter = 0;
            familyGraph.clear();
        });

        // じゃんけん判定（お互いのbeatsリストを照合）
        function playJanken(handId1, handId2) {
            if (handId1 === handId2) return 0;
            
            const h1 = hands.find(h => h.id === handId1);
            const h2 = hands.find(h => h.id === handId2);
            if (!h1 || !h2) return 0;

            if (h1.beats.includes(handId2)) return 1;
            if (h2.beats.includes(handId1)) return -1;
            
            return 0; // すくみの関係にない、あるいは「引き分け」に設定されている場合はあいこ
        }

        function handleCollisions() {
            for (let i = 0; i < creatures.length; i++) {
                for (let j = i + 1; j < creatures.length; j++) {
                    const c1 = creatures[i];
                    const c2 = creatures[j];

                    if (c1.isInvincible() || c2.isInvincible()) continue;

                    const dx = c2.x - c1.x;
                    const dy = c2.y - c1.y;
                    const distance = Math.hypot(dx, dy);
                    const minDist = c1.radius + c2.radius;

                    if (distance < minDist) {
                        const nx = dx / distance;
                        const ny = dy / distance;
                        const rvx = c2.vx - c1.vx;
                        const rvy = c2.vy - c1.vy;
                        const velAlongNormal = rvx * nx + rvy * ny;

                        if (velAlongNormal < 0) {
                            const restitution = 1.0;
                            let jImpulse = -(1 + restitution) * velAlongNormal;
                            jImpulse /= (2);

                            const impulseX = jImpulse * nx;
                            const impulseY = jImpulse * ny;
                            c1.vx -= impulseX;
                            c1.vy -= impulseY;
                            c2.vx += impulseX;
                            c2.vy += impulseY;
                        }

                        const overlap = (minDist - distance) / 2;
                        c1.x -= nx * overlap;
                        c1.y -= ny * overlap;
                        c2.x += nx * overlap;
                        c2.y += ny * overlap;

                        const hand1 = c1.decideHand();
                        const hand2 = c2.decideHand();
                        const result = playJanken(hand1, hand2);

                        if (result === 1) {
                            c1.hp += 1;
                            c2.hp -= 1;
                        } else if (result === -1) {
                            c2.hp += 1;
                            c1.hp -= 1;
                        }
                    }
                }
            }
        }

        function updateStatusPanel() {
            if (!hoveredCreature) {
                statusContent.innerHTML = `
                    <div class="status-placeholder">
                        生き物にカーソルを合わせると<br>詳細なステータスと<br>指定した範囲の親戚達が<br>ぼんやり光り輝きます。
                    </div>
                `;
                return;
            }

            const c = hoveredCreature;
            
            let geneBarsHtml = '';
            hands.forEach(h => {
                const percent = Math.round((c.genes[h.id] || 0) * 100);
                geneBarsHtml += `
                    <div class="gene-label" style="display: flex; justify-content: space-between; margin-top: 5px;">
                        <span>${h.name}</span><span>${percent}%</span>
                    </div>
                    <div class="gene-bar">
                        <div class="gene-fill" style="width: ${percent}%; background-color: ${h.color};"></div>
                    </div>
                `;
            });

            statusContent.innerHTML = `
                <div class="status-item" style="margin-top: 10px;">
                    <span>所属ルーツ:</span>
                    <span style="color: #f1c40f;">${c.familyId}</span>
                </div>
                <div class="status-item">
                    <span>現在体力 (HP):</span>
                    <span style="color: #2ecc71;">${Math.round(c.hp)} / 15</span>
                </div>
                <div class="status-item">
                    <span>周囲の他個体:</span>
                    <span>${c.lastNeighborCount} 体</span>
                </div>
                <div class="status-item">
                    <span>HP減少速度:</span>
                    <span style="color: ${c.lastMultiplier > 2 ? '#e74c3c' : '#aaa'};">
                        ${c.lastMultiplier.toFixed(2)} 倍速
                    </span>
                </div>
                
                <div class="gene-bar-container">
                    <span class="gene-label">🧬 遺伝子比率 (動的ブレンド)</span>
                    ${geneBarsHtml}
                </div>
            `;
        }

        let frameCount = 0;

        function loop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const nextCreatures = [];
            const simDt = 16.67 * timeScale;
            frameCount++;

            if (frameCount % 180 === 0) {
                cleanUpFamilyGraph();
            }

            let closestDist = 20; 
            let tempHovered = null;

            for (let i = 0; i < creatures.length; i++) {
                const c = creatures[i];
                const dist = Math.hypot(c.x - mouseX, c.y - mouseY);
                if (dist < closestDist) {
                    closestDist = dist;
                    tempHovered = c;
                }
            }
            hoveredCreature = tempHovered;

            if (hoveredCreature) {
                ctx.save();
                ctx.beginPath();
                ctx.arc(hoveredCreature.x, hoveredCreature.y, 150, 0, Math.PI * 2); 
                
                ctx.fillStyle = 'rgba(255, 255, 255, 0.02)';
                ctx.fill();

                ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
                ctx.lineWidth = 1.5;
                ctx.setLineDash([6, 4]); 
                ctx.stroke();
                ctx.closePath();
                ctx.restore();
            }

            const currentMode = getSelectedHighlightMode();
            let relativeIds = new Set();
            
            if (hoveredCreature && currentMode === '5degrees') {
                relativeIds = getRelativesWithin5Degrees(hoveredCreature.id);
            }

            for (let i = 0; i < creatures.length; i++) {
                const c = creatures[i];
                c.update(simDt, creatures);
                
                let isHighlighted = false;
                if (hoveredCreature) {
                    if (currentMode === '5degrees') {
                        isHighlighted = relativeIds.has(c.id);
                    } else { 
                        isHighlighted = (c.familyId === hoveredCreature.familyId);
                    }
                }

                c.draw(isHighlighted); 

                if (c.hp >= 15) {
                    c.hp -= 5; 

                    const angle = Math.random() * Math.PI * 2;
                    const offset = c.radius * 1.5; 
                    let cloneX = c.x + Math.cos(angle) * offset;
                    let cloneY = c.y + Math.sin(angle) * offset;

                    cloneX = Math.max(c.radius, Math.min(canvas.width - c.radius, cloneX));
                    cloneY = Math.max(c.radius, Math.min(canvas.height - c.radius, cloneY));

                    const clone = new Creature(cloneX, cloneY, { ...c.genes }, c.familyId, c.id);

                    const mutationRate = parseFloat(mutRateSlider.value) / 100;
                    if (Math.random() < mutationRate) {
                        const mutationAmount = parseFloat(mutAmtSlider.value) / 100;
                        clone.mutate(mutationAmount); 
                    }

                    nextCreatures.push(clone);
                }

                if (c.hp > 0) {
                    nextCreatures.push(c);
                }
            }

            creatures = nextCreatures;

            if (timeScale > 0) {
                handleCollisions();
            }

            countBadge.textContent = creatures.length;

            updateStatusPanel();

            requestAnimationFrame(loop);
        }

        renderHandList();
        renderDynamicSliders();
        loop();
    </script>
</body>
</html>
