<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>じゃんけん生態系シミュレーター (完全修正版)</title>
    <style>
        body {
            margin: 0;
            background-color: #222;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        #container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            width: 90%;
            max-width: 1000px;
        }
        canvas {
            border: 2px solid #555;
            background-color: #111;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            cursor: crosshair;
        }
        #controls {
            background-color: #333;
            padding: 15px 20px;
            border-radius: 8px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            width: 100%;
            box-sizing: border-box;
        }
        .control-block {
            display: flex;
            gap: 15px;
            border-right: 1px solid #555;
            padding-right: 15px;
        }
        .control-block:last-of-type {
            border-right: none;
            padding-right: 0;
        }
        .slider-group {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            font-size: 12px;
            width: 130px;
        }
        .slider-group label {
            margin-bottom: 4px;
            display: flex;
            justify-content: space-between;
            width: 100%;
        }
        .slider-group input {
            width: 100%;
        }
        #rockWeight { accent-color: #ff4a4a; }
        #scissorsWeight { accent-color: #4aff4a; }
        #paperWeight { accent-color: #4a4aff; }
        
        #decayInterval { accent-color: #f39c12; }
        #mutRate { accent-color: #9b59b6; }
        #mutAmt { accent-color: #1abc9c; }

        button {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 10px 18px;
            font-size: 14px;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #c0392b;
        }
        #info {
            font-size: 13px;
            text-align: center;
            line-height: 1.4;
            color: #ccc;
        }
        .count-badge {
            font-weight: bold;
            color: #f1c40f;
        }
    </style>
</head>
<body>

    <div id="container">
        <h2 style="margin: 0;">じゃんけん生態系シミュレーター</h2>
        
        <div id="controls">
            <div class="control-block">
                <div class="slider-group">
                    <label>✊ グー: <span id="rockVal">50</span></label>
                    <input type="range" id="rockWeight" min="0" max="100" value="50">
                </div>
                <div class="slider-group">
                    <label>✌️ チョキ: <span id="scissorsVal">50</span></label>
                    <input type="range" id="scissorsWeight" min="0" max="100" value="50">
                </div>
                <div class="slider-group">
                    <label>🖐️ パー: <span id="paperVal">50</span></label>
                    <input type="range" id="paperWeight" min="0" max="100" value="50">
                </div>
            </div>

            <div class="control-block">
                <div class="slider-group">
                    <label>⏳ HP減少間隔: <span id="decayVal">10</span>秒</label>
                    <input type="range" id="decayInterval" min="1" max="30" value="10">
                </div>
                <div class="slider-group">
                    <label>⚡ 分裂時変異率: <span id="mutRateVal">5</span>%</label>
                    <input type="range" id="mutRate" min="0" max="100" value="5">
                </div>
                <div class="slider-group">
                    <label>🔮 変異の変化幅: <span id="mutAmtVal">10</span>%</label>
                    <input type="range" id="mutAmt" min="1" max="50" value="10">
                </div>
            </div>

            <button id="clearBtn">クリア</button>
        </div>

        <canvas id="simCanvas" width="800" height="480"></canvas>
        
        <div id="info">
            【操作方法】スライダーを設定し、<strong style="color: #fff;">画面をクリックして配置</strong>してください。<br>
            現在の個体数: <span id="creatureCount" class="count-badge">0</span> 体 | 
            <span style="color: #f1c40f; font-weight: bold;">※ 突然変異は分裂してクローンが生まれた瞬間のみ、確率で発生します。</span>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');

        const rockSlider = document.getElementById('rockWeight');
        const scissorsSlider = document.getElementById('scissorsWeight');
        const paperSlider = document.getElementById('paperWeight');
        const rockVal = document.getElementById('rockVal');
        const scissorsVal = document.getElementById('scissorsVal');
        const paperVal = document.getElementById('paperVal');
        const clearBtn = document.getElementById('clearBtn');
        const countBadge = document.getElementById('creatureCount');

        const decayIntervalSlider = document.getElementById('decayInterval');
        const mutRateSlider = document.getElementById('mutRate');
        const mutAmtSlider = document.getElementById('mutAmt');
        const decayVal = document.getElementById('decayVal');
        const mutRateVal = document.getElementById('mutRateVal');
        const mutAmtVal = document.getElementById('mutAmtVal');

        const SPEED_MULT = 0.25; 
        const INFLUENCE_RATE = 0.15; 

        class Creature {
            constructor(x, y, r, s, p) {
                this.x = x;
                this.y = y;
                this.radius = 8;
                this.mass = 1;
                
                const angle = Math.random() * Math.PI * 2;
                const speed = (1 + Math.random() * 2) * SPEED_MULT; 
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;

                this.genes = { rock: r, scissors: s, paper: p };
                this.hp = 10;
                this.lastDecayTime = Date.now();
                this.birthTime = Date.now();
            }

            isInvincible() {
                return (Date.now() - this.birthTime) < 1500;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;

                if (this.x - this.radius < 0) {
                    this.x = this.radius;
                    this.vx *= -1;
                }
                if (this.x + this.radius > canvas.width) {
                    this.x = canvas.width - this.radius;
                    this.vx *= -1;
                }
                if (this.y - this.radius < 0) {
                    this.y = this.radius;
                    this.vy *= -1;
                }
                if (this.y + this.radius > canvas.height) {
                    this.y = canvas.height - this.radius;
                    this.vy *= -1;
                }

                const now = Date.now();
                const decayIntervalMs = parseFloat(decayIntervalSlider.value) * 1000;
                if (now - this.lastDecayTime >= decayIntervalMs) {
                    this.hp -= 1;
                    this.lastDecayTime = now;
                }
            }

            draw() {
                ctx.save();

                const invincible = this.isInvincible();
                if (invincible) {
                    ctx.globalAlpha = 0.4; 
                }

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                
                const red = Math.floor(this.genes.rock * 255);
                const green = Math.floor(this.genes.scissors * 255);
                const blue = Math.floor(this.genes.paper * 255);
                
                ctx.fillStyle = `rgb(${red}, ${green}, ${blue})`;
                ctx.fill();
                
                ctx.strokeStyle = invincible ? '#f1c40f' : '#fff';
                ctx.lineWidth = invincible ? 1.5 : 1;
                ctx.stroke();
                ctx.closePath();

                ctx.fillStyle = invincible ? '#f1c40f' : '#ccc';
                ctx.font = '10px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(Math.round(this.hp), this.x, this.y - this.radius - 4);

                ctx.restore(); 
            }

            decideHand() {
                const rand = Math.random();
                if (rand < this.genes.rock) {
                    return 'rock';
                } else if (rand < this.genes.rock + this.genes.scissors) {
                    return 'scissors';
                } else {
                    return 'paper';
                }
            }

            // 突然変異処理
            mutate(mutationAmount) {
                const keys = ['rock', 'scissors', 'paper'];
                const loseAttr = keys[Math.floor(Math.random() * keys.length)];
                let gainAttr;
                do {
                    gainAttr = keys[Math.floor(Math.random() * keys.length)];
                } while (gainAttr === loseAttr);

                const actualN = Math.min(mutationAmount, this.genes[loseAttr]);
                this.genes[loseAttr] -= actualN;
                this.genes[gainAttr] += actualN;

                // 合計を確実に 1.0 に再調整
                const sum = this.genes.rock + this.genes.scissors + this.genes.paper;
                this.genes.rock /= sum;
                this.genes.scissors /= sum;
                this.genes.paper /= sum;
            }
        }

        let creatures = [];

        function updateLabels() {
            rockVal.textContent = rockSlider.value;
            scissorsVal.textContent = scissorsSlider.value;
            paperVal.textContent = paperSlider.value;

            decayVal.textContent = decayIntervalSlider.value;
            mutRateVal.textContent = mutRateSlider.value;
            mutAmtVal.textContent = mutAmtSlider.value;
        }

        [rockSlider, scissorsSlider, paperSlider, decayIntervalSlider, mutRateSlider, mutAmtSlider].forEach(slider => {
            slider.addEventListener('input', updateLabels);
        });

        updateLabels();

        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            const rW = parseFloat(rockSlider.value);
            const sW = parseFloat(scissorsSlider.value);
            const pW = parseFloat(paperSlider.value);
            let sum = rW + sW + pW;

            let r, s, p;
            if (sum === 0) {
                r = s = p = 1/3;
            } else {
                r = rW / sum;
                s = sW / sum;
                p = pW / sum; // ★【修正】ここが抜けていたため、パー（青）が反映されていませんでした！
            }

            creatures.push(new Creature(x, y, r, s, p));
            countBadge.textContent = creatures.length;
        });

        clearBtn.addEventListener('click', () => {
            creatures = [];
            countBadge.textContent = 0;
        });

        function playJanken(hand1, hand2) {
            if (hand1 === hand2) return 0;
            if (
                (hand1 === 'rock' && hand2 === 'scissors') ||
                (hand1 === 'scissors' && hand2 === 'paper') ||
                (hand1 === 'paper' && hand2 === 'rock')
            ) {
                return 1;
            }
            return -1;
        }

        function handleCollisions() {
            for (let i = 0; i < creatures.length; i++) {
                for (let j = i + 1; j < creatures.length; j++) {
                    const c1 = creatures[i];
                    const c2 = creatures[j];

                    if (c1.isInvincible() || c2.isInvincible()) {
                        continue;
                    }

                    const dx = c2.x - c1.x;
                    const dy = c2.y - c1.y;
                    const distance = Math.hypot(dx, dy);
                    const minDist = c1.radius + c2.radius;

                    if (distance < minDist) {
                        const nx = dx / distance;
                        const ny = dy / distance;
                        const rvx = c2.vx - c1.vx;
                        const rvy = c2.vy - c1.vy;
                        const velAlongNormal = rvx * nx + rvy * ny;

                        if (velAlongNormal < 0) {
                            const restitution = 1.0;
                            let jImpulse = -(1 + restitution) * velAlongNormal;
                            jImpulse /= (2);

                            const impulseX = jImpulse * nx;
                            const impulseY = jImpulse * ny;
                            c1.vx -= impulseX;
                            c1.vy -= impulseY;
                            c2.vx += impulseX;
                            c2.vy += impulseY;
                        }

                        const overlap = (minDist - distance) / 2;
                        c1.x -= nx * overlap;
                        c1.y -= ny * overlap;
                        c2.x += nx * overlap;
                        c2.y += ny * overlap;

                        const hand1 = c1.decideHand();
                        const hand2 = c2.decideHand();
                        const result = playJanken(hand1, hand2);

                        if (result === 1) {
                            absorb(c1, c2);
                            c1.hp += 1;
                            c2.hp -= 1;
                        } else if (result === -1) {
                            absorb(c2, c1);
                            c2.hp += 1;
                            c1.hp -= 1;
                        }
                    }
                }
            }
        }

        function absorb(winner, loser) {
            for (const key in loser.genes) {
                loser.genes[key] += (winner.genes[key] - loser.genes[key]) * INFLUENCE_RATE;
            }
            const sum = loser.genes.rock + loser.genes.scissors + loser.genes.paper;
            loser.genes.rock /= sum;
            loser.genes.scissors /= sum;
            loser.genes.paper /= sum;
        }

        function loop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const nextCreatures = [];

            for (let i = 0; i < creatures.length; i++) {
                const c = creatures[i];
                c.update();
                c.draw();

                // 分裂（クローン）処理
                if (c.hp >= 15) {
                    c.hp -= 10;

                    const angle = Math.random() * Math.PI * 2;
                    const offset = c.radius * 1.5; 
                    let cloneX = c.x + Math.cos(angle) * offset;
                    let cloneY = c.y + Math.sin(angle) * offset;

                    cloneX = Math.max(c.radius, Math.min(canvas.width - c.radius, cloneX));
                    cloneY = Math.max(c.radius, Math.min(canvas.height - c.radius, cloneY));

                    // 親の遺伝子をベースにクローンを生成
                    const clone = new Creature(cloneX, cloneY, c.genes.rock, c.genes.scissors, c.genes.paper);

                    // 突然変異は分裂して生まれた瞬間のクローンのみに適用
                    const mutationRate = parseFloat(mutRateSlider.value) / 100;
                    if (Math.random() < mutationRate) {
                        const mutationAmount = parseFloat(mutAmtSlider.value) / 100;
                        clone.mutate(mutationAmount); // クローン側だけ突然変異させる
                    }

                    nextCreatures.push(clone);
                }

                if (c.hp > 0) {
                    nextCreatures.push(c);
                }
            }

            creatures = nextCreatures;

            handleCollisions();

            countBadge.textContent = creatures.length;

            requestAnimationFrame(loop);
        }

        loop();
    </script>
</body>
</html>
