<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>じゃんけん生態系シミュレーター</title>
    <style>
        body {
            margin: 0;
            background-color: #222;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        canvas {
            border: 2px solid #555;
            background-color: #111;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        #info {
            margin-top: 10px;
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>
<body>

    <h2 style="margin: 5px;">じゃんけん生態系シミュレーター</h2>
    <canvas id="simCanvas" width="800" height="600"></canvas>
    <div id="info">
        赤: グー多め | 緑: チョキ多め | 青: パー多め<br>
        衝突するとじゃんけんをして、負けた方が勝った方の遺伝子に少し染まります（突然変異も低確率で発生）。
    </div>

    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');

        const NUM_CREATURES = 50; // 生き物の数
        const MUTATION_RATE = 0.05; // 突然変異が起きる確率 (5%)
        const MUTATION_AMOUNT = 0.1; // 突然変異時の変化量 (10%)
        const INFLUENCE_RATE = 0.2; // 負けた方が勝った方に染まる割合 (20%)

        class Creature {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 8;
                
                // 初期の移動速度をランダムに設定
                const angle = Math.random() * Math.PI * 2;
                const speed = 1 + Math.random() * 2;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;

                // 初期遺伝子（グー、チョキ、パーの確率。足して1.0）
                // 均等ではなく、最初は少しランダムに偏りを持たせる
                let r = Math.random();
                let s = Math.random();
                let p = Math.random();
                let sum = r + s + p;
                this.genes = {
                    rock: r / sum,
                    scissors: s / sum,
                    paper: p / sum
                };
            }

            // 移動と画面端でのバウンド
            update() {
                this.x += this.vx;
                this.y += this.vy;

                if (this.x - this.radius < 0) {
                    this.x = this.radius;
                    this.vx *= -1;
                }
                if (this.x + this.radius > canvas.width) {
                    this.x = canvas.width - this.radius;
                    this.vx *= -1;
                }
                if (this.y - this.radius < 0) {
                    this.y = this.radius;
                    this.vy *= -1;
                }
                if (this.y + this.radius > canvas.height) {
                    this.y = canvas.height - this.radius;
                    this.vy *= -1;
                }
            }

            // 描画：遺伝子の割合に応じて RGB (赤・緑・青) に着色
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                
                // 遺伝子を色に変換 (0〜255)
                const red = Math.floor(this.genes.rock * 255);
                const green = Math.floor(this.genes.scissors * 255);
                const blue = Math.floor(this.genes.paper * 255);
                
                ctx.fillStyle = `rgb(${red}, ${green}, ${blue})`;
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 1;
                ctx.stroke();
                ctx.closePath();
            }

            // 自分の遺伝子に基づいて、出す手を決定する
            decideHand() {
                const rand = Math.random();
                if (rand < this.genes.rock) {
                    return 'rock';
                } else if (rand < this.genes.rock + this.genes.scissors) {
                    return 'scissors';
                } else {
                    return 'paper';
                }
            }

            // 突然変異
            mutate() {
                const keys = ['rock', 'scissors', 'paper'];
                const loseAttr = keys[Math.floor(Math.random() * keys.length)];
                let gainAttr;
                do {
                    gainAttr = keys[Math.floor(Math.random() * keys.length)];
                } while (gainAttr === loseAttr);

                // 実際に減らせる限界を計算（0未満にならないように）
                const actualN = Math.min(MUTATION_AMOUNT, this.genes[loseAttr]);
                this.genes[loseAttr] -= actualN;
                this.genes[gainAttr] += actualN;
            }
        }

        // 生き物たちの配列を初期化
        const creatures = [];
        for (let i = 0; i < NUM_CREATURES; i++) {
            creatures.push(new Creature(
                Math.random() * (canvas.width - 40) + 20,
                Math.random() * (canvas.height - 40) + 20
            ));
        }

        // 2つの手でじゃんけん勝負
        // 戻り値: 1（hand1の勝ち）, -1（hand2の勝ち）, 0（あいこ）
        function playJanken(hand1, hand2) {
            if (hand1 === hand2) return 0;
            if (
                (hand1 === 'rock' && hand2 === 'scissors') ||
                (hand1 === 'scissors' && hand2 === 'paper') ||
                (hand1 === 'paper' && hand2 === 'rock')
            ) {
                return 1;
            }
            return -1;
        }

        // 衝突判定と相互作用の処理
        function handleCollisions() {
            for (let i = 0; i < creatures.length; i++) {
                for (let j = i + 1; j < creatures.length; j++) {
                    const c1 = creatures[i];
                    const c2 = creatures[j];

                    // 円同士の距離を計算
                    const dx = c2.x - c1.x;
                    const dy = c2.y - c1.y;
                    const distance = Math.hypot(dx, dy);
                    const minDist = c1.radius + c2.radius;

                    if (distance < minDist) {
                        // 1. 簡単な跳ね返り（めり込み防止と速度反転）
                        c1.vx *= -1;
                        c1.vy *= -1;
                        c2.vx *= -1;
                        c2.vy *= -1;

                        // 2. じゃんけんバトル
                        const hand1 = c1.decideHand();
                        const hand2 = c2.decideHand();
                        const result = playJanken(hand1, hand2);

                        if (result === 1) {
                            // c1の勝ち：c2の遺伝子がc1に近づく
                            absorb(c1, c2);
                        } else if (result === -1) {
                            // c2の勝ち：c1の遺伝子がc2に近づく
                            absorb(c2, c1);
                        }

                        // 3. 確率で突然変異
                        if (Math.random() < MUTATION_RATE) c1.mutate();
                        if (Math.random() < MUTATION_RATE) c2.mutate();
                    }
                }
            }
        }

        // 勝者(winner)が敗者(loser)に遺伝子を浸透させる
        function absorb(winner, loser) {
            for (const key in loser.genes) {
                // 敗者の遺伝子を勝者に少し近づける
                loser.genes[key] += (winner.genes[key] - loser.genes[key]) * INFLUENCE_RATE;
            }
            // 誤差をなくすため、合計が1.0になるよう再正規化
            const sum = loser.genes.rock + loser.genes.scissors + loser.genes.paper;
            loser.genes.rock /= sum;
            loser.genes.scissors /= sum;
            loser.genes.paper /= sum;
        }

        // メインループ
        function loop() {
            // 画面をクリア
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 更新と描画
            creatures.forEach(c => {
                c.update();
                c.draw();
            });

            // 衝突判定
            handleCollisions();

            requestAnimationFrame(loop);
        }

        // スタート
        loop();
    </script>
</body>
</html>
