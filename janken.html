<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>じゃんけん生態系シミュレーター (血縁ハイライト切り替え版)</title>
    <style>
        body {
            margin: 0;
            background-color: #222;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        #container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            width: 95%;
            max-width: 1100px;
        }
        
        /* 左右レイアウト用ラッパー */
        #main-area {
            display: flex;
            gap: 15px;
            width: 100%;
            justify-content: center;
            align-items: stretch;
        }

        canvas {
            border: 2px solid #555;
            background-color: #111;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            cursor: crosshair;
        }

        /* 右側：ステータスパネル */
        #statusPanel {
            width: 260px;
            background-color: #2c2c2c;
            border: 2px solid #555;
            border-radius: 8px;
            padding: 15px;
            box-sizing: border-box;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        #statusPanel h3 {
            margin: 0 0 5px 0;
            padding-bottom: 8px;
            border-bottom: 1px solid #555;
            color: #f1c40f;
            font-size: 15px;
            text-align: center;
        }
        
        /* ハイライト切り替え用のUI */
        #highlightConfig {
            background-color: #1e1e1e;
            border-radius: 6px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            font-size: 11px;
            border: 1px solid #444;
        }
        .highlight-title {
            color: #f1c40f;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .radio-group {
            display: flex;
            gap: 12px;
        }
        .radio-label {
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            user-select: none;
            color: #ccc;
        }
        .radio-label input {
            margin: 0;
            cursor: pointer;
        }

        .status-placeholder {
            color: #888;
            text-align: center;
            margin-top: auto;
            margin-bottom: auto;
            font-size: 12px;
            line-height: 1.6;
        }
        .status-item {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            border-bottom: 1px dashed #444;
            padding-bottom: 4px;
        }
        .status-item span:last-child {
            font-weight: bold;
        }

        /* 遺伝子バーのビジュアル */
        .gene-bar-container {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-top: 5px;
        }
        .gene-label {
            font-size: 11px;
            color: #aaa;
        }
        .gene-bar {
            height: 14px;
            border-radius: 3px;
            position: relative;
            background-color: #111;
            overflow: hidden;
        }
        .gene-fill {
            height: 100%;
            width: 0%;
            transition: width 0.2s;
        }

        #controls {
            background-color: #333;
            padding: 12px 20px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            width: 100%;
            box-sizing: border-box;
        }
        
        .control-grid {
            display: flex;
            gap: 20px;
            width: 100%;
            justify-content: center;
        }
        .control-column {
            display: flex;
            flex-direction: column;
            gap: 8px;
            border-right: 1px solid #555;
            padding-right: 20px;
        }
        .control-column:last-of-type {
            border-right: none;
            padding-right: 0;
        }

        .slider-group {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            font-size: 12px;
            width: 190px;
        }
        .slider-group label {
            margin-bottom: 4px;
            font-weight: bold;
        }
        
        .input-row {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
        }
        .input-row input[type="range"] {
            flex: 1;
            min-width: 0;
        }
        .input-row input[type="number"] {
            width: 45px;
            min-width: 45px;
            background-color: #444;
            color: #fff;
            border: 1px solid #666;
            border-radius: 4px;
            padding: 3px;
            font-size: 11px;
            text-align: center;
            box-sizing: border-box;
        }

        .control-bottom {
            display: flex;
            width: 100%;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #444;
            padding-top: 10px;
        }

        #speed-control {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        #speed-control span {
            font-size: 13px;
            font-weight: bold;
            margin-right: 6px;
            color: #bbb;
        }
        .speed-btn {
            background-color: #444;
            color: #ccc;
            border: 1px solid #555;
            padding: 6px 12px;
            font-size: 12px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .speed-btn:hover {
            background-color: #555;
            color: #fff;
        }
        .speed-btn.active {
            background-color: #3498db;
            color: #fff;
            border-color: #2980b9;
            font-weight: bold;
        }

        #rockWeight { accent-color: #ff4a4a; }
        #scissorsWeight { accent-color: #4aff4a; }
        #paperWeight { accent-color: #4a4aff; }
        #decayInterval { accent-color: #f39c12; }
        #mutRate { accent-color: #9b59b6; }
        #mutAmt { accent-color: #1abc9c; }

        button#clearBtn {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 8px 18px;
            font-size: 14px;
            border-radius: 4px;
            cursor: pointer;
        }
        button#clearBtn:hover {
            background-color: #c0392b;
        }
        #info {
            font-size: 12px;
            text-align: center;
            line-height: 1.4;
            color: #ccc;
        }
        .count-badge {
            font-weight: bold;
            color: #f1c40f;
        }
    </style>
</head>
<body>

    <div id="container">
        <h2 style="margin: 0;">じゃんけん生態系シミュレーター</h2>
        
        <div id="controls">
            <div class="control-grid">
                <div class="control-column">
                    <div class="slider-group">
                        <label>✊ グー重み</label>
                        <div class="input-row">
                            <input type="range" id="rockWeight" min="0" max="100" value="50">
                            <input type="number" id="rockNum" min="0" max="100" value="50">
                        </div>
                    </div>
                    <div class="slider-group">
                        <label>⏳ 基準HP減少間隔 (秒)</label>
                        <div class="input-row">
                            <input type="range" id="decayInterval" min="1" max="300" value="120">
                            <input type="number" id="decayNum" min="1" max="300" value="120">
                        </div>
                    </div>
                </div>

                <div class="control-column">
                    <div class="slider-group">
                        <label>✌️ チョキ重み</label>
                        <div class="input-row">
                            <input type="range" id="scissorsWeight" min="0" max="100" value="50">
                            <input type="number" id="scissorsNum" min="0" max="100" value="50">
                        </div>
                    </div>
                    <div class="slider-group">
                        <label>⚡ 分裂時変異率 (%)</label>
                        <div class="input-row">
                            <input type="range" id="mutRate" min="0" max="100" value="5">
                            <input type="number" id="mutRateNum" min="0" max="100" value="5">
                        </div>
                    </div>
                </div>

                <div class="control-column">
                    <div class="slider-group">
                        <label>🖐️ パー重み</label>
                        <div class="input-row">
                            <input type="range" id="paperWeight" min="0" max="100" value="50">
                            <input type="number" id="paperNum" min="0" max="100" value="50">
                        </div>
                    </div>
                    <div class="slider-group">
                        <label>🔮 変異変化幅 (%)</label>
                        <div class="input-row">
                            <input type="range" id="mutAmt" min="1" max="50" value="10">
                            <input type="number" id="mutAmtNum" min="1" max="50" value="10">
                        </div>
                    </div>
                </div>
            </div>

            <div class="control-bottom">
                <div id="speed-control">
                    <span>⏱️ 時間速度:</span>
                    <button class="speed-btn" data-speed="0">0倍 (停止)</button>
                    <button class="speed-btn" data-speed="0.25">1/4倍</button>
                    <button class="speed-btn" data-speed="0.5">1/2倍</button>
                    <button class="speed-btn active" data-speed="1">1倍 (標準)</button>
                    <button class="speed-btn" data-speed="2">2倍</button>
                    <button class="speed-btn" data-speed="4">4倍</button>
                </div>
                <button id="clearBtn">クリア</button>
            </div>
        </div>

        <div id="main-area">
            <canvas id="simCanvas" width="800" height="480"></canvas>
            
            <div id="statusPanel">
                <h3>🧬 個体ステータス</h3>
                
                <div id="highlightConfig">
                    <div class="highlight-title">💡 ハイライト対象</div>
                    <div class="radio-group">
                        <label class="radio-label">
                            <input type="radio" name="highlightMode" value="5degrees" checked> 5親等以内
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="highlightMode" value="all"> 一族全員
                        </label>
                    </div>
                </div>

                <div id="statusContent" style="display: flex; flex-direction: column; gap: 10px; height: 100%;">
                    <div class="status-placeholder">
                        生き物にカーソルを合わせると<br>詳細なステータスと<br>指定した範囲の親戚達が<br>ぼんやり光り輝きます。
                    </div>
                </div>
            </div>
        </div>
        
        <div id="info">
            【操作方法】設定を行い、<strong style="color: #fff;">画面をクリックして配置</strong>してください。<br>
            現在の個体数: <span id="creatureCount" class="count-badge">0</span> 体 | 
            <span style="color: #1abc9c; font-weight: bold;">※ 周囲（半径150px）に他個体が多いと密状態になりHP減少が加速します（50体で4倍速）。</span>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');

        const rockSlider = document.getElementById('rockWeight');
        const scissorsSlider = document.getElementById('scissorsWeight');
        const paperSlider = document.getElementById('paperWeight');
        const clearBtn = document.getElementById('clearBtn');
        const countBadge = document.getElementById('creatureCount');

        const decayIntervalSlider = document.getElementById('decayInterval');
        const mutRateSlider = document.getElementById('mutRate');
        const mutAmtSlider = document.getElementById('mutAmt');
        
        const statusContent = document.getElementById('statusContent');

        // ハイライトモード取得用ラジオボタン
        const highlightRadios = document.getElementsByName('highlightMode');

        const SPEED_MULT = 0.25; 
        let timeScale = 1.0; 

        // --- 家系・ID管理システム ---
        let familyCounter = 0;
        let creatureIdCounter = 0;

        // 家系関係を保持する無向グラフ (Map: creatureId -> Set of connected creatureIds)
        const familyGraph = new Map();

        // マウス座標＆ホバー中の個体管理
        let mouseX = -9999;
        let mouseY = -9999;
        let hoveredCreature = null;

        class Creature {
            constructor(x, y, r, s, p, familyId, parentId = null) {
                this.id = ++creatureIdCounter; // ユニークID
                
                this.x = x;
                this.y = y;
                this.radius = 8;
                this.mass = 1;
                
                const angle = Math.random() * Math.PI * 2;
                const speed = (1 + Math.random() * 2) * SPEED_MULT; 
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;

                this.genes = { rock: r, scissors: s, paper: p };
                this.hp = 10;
                
                this.simulatedAge = 0;       
                this.decayAccumulator = 0; 

                // 初代が設定された場合はその家系名、なければ新規
                this.familyId = familyId || `家系 #${++familyCounter}`;

                // 親子関係をグラフに登録
                familyGraph.set(this.id, new Set());
                if (parentId && familyGraph.has(parentId)) {
                    familyGraph.get(parentId).add(this.id);
                    familyGraph.get(this.id).add(parentId);
                }

                // 毎フレーム表示用
                this.lastNeighborCount = 0;
                this.lastMultiplier = 1.0;
            }

            isInvincible() {
                return this.simulatedAge < 1500; 
            }

            update(simDt, allCreatures) {
                this.x += this.vx * timeScale;
                this.y += this.vy * timeScale;

                if (this.x - this.radius < 0) {
                    this.x = this.radius;
                    this.vx *= -1;
                }
                if (this.x + this.radius > canvas.width) {
                    this.x = canvas.width - this.radius;
                    this.vx *= -1;
                }
                if (this.y - this.radius < 0) {
                    this.y = this.radius;
                    this.vy *= -1;
                }
                if (this.y + this.radius > canvas.height) {
                    this.y = canvas.height - this.radius;
                    this.vy *= -1;
                }

                this.simulatedAge += simDt;

                // --- 密度依存型HP減少システム (150px-50体で4倍調整) ---
                const CROWD_RADIUS = 150; 
                let neighborCount = 0;

                for (let i = 0; i < allCreatures.length; i++) {
                    const other = allCreatures[i];
                    if (other === this) continue;
                    const dist = Math.hypot(other.x - this.x, other.y - this.y);
                    if (dist < CROWD_RADIUS) {
                        neighborCount++;
                    }
                }

                const densityMultiplier = 0.4 + neighborCount * 0.072;

                this.lastNeighborCount = neighborCount;
                this.lastMultiplier = densityMultiplier;

                this.decayAccumulator += simDt * densityMultiplier;

                const decayIntervalMs = parseFloat(decayIntervalSlider.value) * 1000;
                if (this.decayAccumulator >= decayIntervalMs) {
                    this.hp -= 1;
                    this.decayAccumulator -= decayIntervalMs; 
                }
            }

            // 引数に「光らせるべきか」のフラグを受け取る
            draw(isHighlighted) {
                ctx.save();

                const red = Math.floor(this.genes.rock * 255);
                const green = Math.floor(this.genes.scissors * 255);
                const blue = Math.floor(this.genes.paper * 255);

                // 対象時にオーラを纏う
                if (isHighlighted) {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius + 6, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(${red}, ${green}, ${blue}, 0.45)`; 
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = `rgb(${red}, ${green}, ${blue})`;
                    ctx.fill();
                    ctx.closePath();
                    ctx.shadowBlur = 0; 
                }

                const invincible = this.isInvincible();
                if (invincible) {
                    ctx.globalAlpha = 0.4; 
                }

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                
                ctx.fillStyle = `rgb(${red}, ${green}, ${blue})`;
                ctx.fill();
                
                ctx.strokeStyle = invincible ? '#f1c40f' : '#fff';
                ctx.lineWidth = invincible ? 1.5 : 1;
                ctx.stroke();
                ctx.closePath();

                ctx.fillStyle = invincible ? '#f1c40f' : '#ccc';
                ctx.font = '10px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(Math.round(this.hp), this.x, this.y - this.radius - 4);

                ctx.restore(); 
            }

            decideHand() {
                const rand = Math.random();
                if (rand < this.genes.rock) {
                    return 'rock';
                } else if (rand < this.genes.rock + this.genes.scissors) {
                    return 'scissors';
                } else {
                    return 'paper';
                }
            }

            mutate(mutationAmount) {
                const keys = ['rock', 'scissors', 'paper'];
                const loseAttr = keys[Math.floor(Math.random() * keys.length)];
                let gainAttr;
                do {
                    gainAttr = keys[Math.floor(Math.random() * keys.length)];
                } while (gainAttr === loseAttr);

                const actualN = Math.min(mutationAmount, this.genes[loseAttr]);
                this.genes[loseAttr] -= actualN;
                this.genes[gainAttr] += actualN;

                const sum = this.genes.rock + this.genes.scissors + this.genes.paper;
                this.genes.rock /= sum;
                this.genes.scissors /= sum;
                this.genes.paper /= sum;
            }
        }

        let creatures = [];

        // --- 現在選択されているハイライトモードを取得 ---
        function getSelectedHighlightMode() {
            for (const r of highlightRadios) {
                if (r.checked) return r.value;
            }
            return '5degrees';
        }

        // --- 【BFSアルゴリズム】ホバー対象から5親等以内の個体IDを取得 ---
        function getRelativesWithin5Degrees(startId) {
            const relatives = new Set();
            const queue = [{ id: startId, dist: 0 }];
            const visited = new Set();
            visited.add(startId);

            while (queue.length > 0) {
                const { id, dist } = queue.shift();
                relatives.add(id);

                if (dist < 5) {
                    const neighbors = familyGraph.get(id);
                    if (neighbors) {
                        for (const neighborId of neighbors) {
                            if (!visited.has(neighborId)) {
                                visited.add(neighborId);
                                queue.push({ id: neighborId, dist: dist + 1 });
                            }
                        }
                    }
                }
            }
            return relatives;
        }

        // --- 【GC処理】メモリ節約のための家族グラフのクリーニング ---
        function cleanUpFamilyGraph() {
            const activeIds = new Set();
            const visited = new Set();

            for (let i = 0; i < creatures.length; i++) {
                const startId = creatures[i].id;
                if (visited.has(startId)) continue;

                const queue = [{ id: startId, dist: 0 }];
                visited.add(startId);

                while (queue.length > 0) {
                    const { id, dist } = queue.shift();
                    activeIds.add(id);

                    if (dist < 5) {
                        const neighbors = familyGraph.get(id);
                        if (neighbors) {
                            for (const neighborId of neighbors) {
                                if (!visited.has(neighborId)) {
                                    visited.add(neighborId);
                                    queue.push({ id: neighborId, dist: dist + 1 });
                                }
                            }
                        }
                    }
                }
            }

            for (const id of familyGraph.keys()) {
                if (!activeIds.has(id)) {
                    familyGraph.delete(id);
                } else {
                    const neighbors = familyGraph.get(id);
                    for (const neighborId of neighbors) {
                        if (!activeIds.has(neighborId)) {
                            neighbors.delete(neighborId);
                        }
                    }
                }
            }
        }

        // 双方向入力同期
        const inputPairs = [
            { slider: document.getElementById('rockWeight'), num: document.getElementById('rockNum') },
            { slider: document.getElementById('scissorsWeight'), num: document.getElementById('scissorsNum') },
            { slider: document.getElementById('paperWeight'), num: document.getElementById('paperNum') },
            { slider: document.getElementById('decayInterval'), num: document.getElementById('decayNum') },
            { slider: document.getElementById('mutRate'), num: document.getElementById('mutRateNum') },
            { slider: document.getElementById('mutAmt'), num: document.getElementById('mutAmtNum') }
        ];

        inputPairs.forEach(pair => {
            pair.slider.addEventListener('input', () => {
                pair.num.value = pair.slider.value;
            });
            pair.num.addEventListener('input', () => {
                let val = parseFloat(pair.num.value);
                const min = parseFloat(pair.slider.min);
                const max = parseFloat(pair.slider.max);
                if (isNaN(val)) return;
                if (val < min) val = min;
                if (val > max) val = max;
                pair.slider.value = val;
            });
            pair.num.addEventListener('blur', () => {
                if (pair.num.value === '' || isNaN(parseFloat(pair.num.value))) {
                    pair.num.value = pair.slider.value;
                } else {
                    let val = parseFloat(pair.num.value);
                    const min = parseFloat(pair.slider.min);
                    const max = parseFloat(pair.slider.max);
                    if (val < min) val = min;
                    if (val > max) val = max;
                    pair.num.value = val;
                }
            });
        });

        const speedBtns = document.querySelectorAll('.speed-btn');
        speedBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                speedBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                timeScale = parseFloat(btn.dataset.speed);
            });
        });

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            mouseY = e.clientY - rect.top;
        });

        canvas.addEventListener('mouseleave', () => {
            mouseX = -9999;
            mouseY = -9999;
            hoveredCreature = null;
        });

        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            if (hoveredCreature) return;

            const rW = parseFloat(rockSlider.value);
            const sW = parseFloat(scissorsSlider.value);
            const pW = parseFloat(paperSlider.value);
            let sum = rW + sW + pW;

            let r, s, p;
            if (sum === 0) {
                r = s = p = 1/3;
            } else {
                r = rW / sum;
                s = sW / sum;
                p = pW / sum;
            }

            creatures.push(new Creature(x, y, r, s, p));
            countBadge.textContent = creatures.length;
        });

        clearBtn.addEventListener('click', () => {
            creatures = [];
            countBadge.textContent = 0;
            hoveredCreature = null;
            familyCounter = 0;
            creatureIdCounter = 0;
            familyGraph.clear();
        });

        function playJanken(hand1, hand2) {
            if (hand1 === hand2) return 0;
            if (
                (hand1 === 'rock' && hand2 === 'scissors') ||
                (hand1 === 'scissors' && hand2 === 'paper') ||
                (hand1 === 'paper' && hand2 === 'rock')
            ) {
                return 1;
            }
            return -1;
        }

        function handleCollisions() {
            for (let i = 0; i < creatures.length; i++) {
                for (let j = i + 1; j < creatures.length; j++) {
                    const c1 = creatures[i];
                    const c2 = creatures[j];

                    if (c1.isInvincible() || c2.isInvincible()) continue;

                    const dx = c2.x - c1.x;
                    const dy = c2.y - c1.y;
                    const distance = Math.hypot(dx, dy);
                    const minDist = c1.radius + c2.radius;

                    if (distance < minDist) {
                        const nx = dx / distance;
                        const ny = dy / distance;
                        const rvx = c2.vx - c1.vx;
                        const rvy = c2.vy - c1.vy;
                        const velAlongNormal = rvx * nx + rvy * ny;

                        if (velAlongNormal < 0) {
                            const restitution = 1.0;
                            let jImpulse = -(1 + restitution) * velAlongNormal;
                            jImpulse /= (2);

                            const impulseX = jImpulse * nx;
                            const impulseY = jImpulse * ny;
                            c1.vx -= impulseX;
                            c1.vy -= impulseY;
                            c2.vx += impulseX;
                            c2.vy += impulseY;
                        }

                        const overlap = (minDist - distance) / 2;
                        c1.x -= nx * overlap;
                        c1.y -= ny * overlap;
                        c2.x += nx * overlap;
                        c2.y += ny * overlap;

                        const hand1 = c1.decideHand();
                        const hand2 = c2.decideHand();
                        const result = playJanken(hand1, hand2);

                        if (result === 1) {
                            c1.hp += 1;
                            c2.hp -= 1;
                        } else if (result === -1) {
                            c2.hp += 1;
                            c1.hp -= 1;
                        }
                    }
                }
            }
        }

        function updateStatusPanel() {
            if (!hoveredCreature) {
                statusContent.innerHTML = `
                    <div class="status-placeholder">
                        生き物にカーソルを合わせると<br>詳細なステータスと<br>指定した範囲の親戚達が<br>ぼんやり光り輝きます。
                    </div>
                `;
                return;
            }

            const c = hoveredCreature;
            const rPercent = Math.round(c.genes.rock * 100);
            const sPercent = Math.round(c.genes.scissors * 100);
            const pPercent = Math.round(c.genes.paper * 100);

            statusContent.innerHTML = `
                <div class="status-item" style="margin-top: 10px;">
                    <span>所属ルーツ:</span>
                    <span style="color: #f1c40f;">${c.familyId}</span>
                </div>
                <div class="status-item">
                    <span>現在体力 (HP):</span>
                    <span style="color: #2ecc71;">${Math.round(c.hp)} / 15</span>
                </div>
                <div class="status-item">
                    <span>周囲の他個体:</span>
                    <span>${c.lastNeighborCount} 体</span>
                </div>
                <div class="status-item">
                    <span>HP減少速度:</span>
                    <span style="color: ${c.lastMultiplier > 2 ? '#e74c3c' : '#aaa'};">
                        ${c.lastMultiplier.toFixed(2)} 倍速
                    </span>
                </div>
                
                <div class="gene-bar-container">
                    <span class="gene-label">🧬 遺伝子比率 (じゃんけん比率)</span>
                    
                    <div class="gene-label" style="display: flex; justify-content: space-between; margin-top: 5px;">
                        <span>✊ グー</span><span>${rPercent}%</span>
                    </div>
                    <div class="gene-bar">
                        <div class="gene-fill" style="width: ${rPercent}%; background-color: #ff4a4a;"></div>
                    </div>

                    <div class="gene-label" style="display: flex; justify-content: space-between; margin-top: 5px;">
                        <span>✌️ チョキ</span><span>${sPercent}%</span>
                    </div>
                    <div class="gene-bar">
                        <div class="gene-fill" style="width: ${sPercent}%; background-color: #4aff4a;"></div>
                    </div>

                    <div class="gene-label" style="display: flex; justify-content: space-between; margin-top: 5px;">
                        <span>🖐️ パー</span><span>${pPercent}%</span>
                    </div>
                    <div class="gene-bar">
                        <div class="gene-fill" style="width: ${pPercent}%; background-color: #4a4aff;"></div>
                    </div>
                </div>
            `;
        }

        let frameCount = 0;

        function loop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const nextCreatures = [];
            const simDt = 16.67 * timeScale;
            frameCount++;

            // 3秒に一度のGC処理
            if (frameCount % 180 === 0) {
                cleanUpFamilyGraph();
            }

            // --- 1. ホバー検出 ---
            let closestDist = 20; 
            let tempHovered = null;

            for (let i = 0; i < creatures.length; i++) {
                const c = creatures[i];
                const dist = Math.hypot(c.x - mouseX, c.y - mouseY);
                if (dist < closestDist) {
                    closestDist = dist;
                    tempHovered = c;
                }
            }
            hoveredCreature = tempHovered;

            // --- 2. 150pxの過密判定エリア可視化を描く ---
            if (hoveredCreature) {
                ctx.save();
                ctx.beginPath();
                ctx.arc(hoveredCreature.x, hoveredCreature.y, 150, 0, Math.PI * 2); 
                
                ctx.fillStyle = 'rgba(255, 255, 255, 0.02)';
                ctx.fill();

                ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
                ctx.lineWidth = 1.5;
                ctx.setLineDash([6, 4]); 
                ctx.stroke();
                ctx.closePath();
                ctx.restore();
            }

            // --- 3. ハイライト判定データの準備 ---
            const currentMode = getSelectedHighlightMode();
            let relativeIds = new Set();
            
            if (hoveredCreature && currentMode === '5degrees') {
                relativeIds = getRelativesWithin5Degrees(hoveredCreature.id);
            }

            // --- 4. 生き物たちのアップデートと描画 ---
            for (let i = 0; i < creatures.length; i++) {
                const c = creatures[i];
                c.update(simDt, creatures);
                
                // ハイライト条件判定
                let isHighlighted = false;
                if (hoveredCreature) {
                    if (currentMode === '5degrees') {
                        isHighlighted = relativeIds.has(c.id);
                    } else { // 'all' (一族全員)
                        isHighlighted = (c.familyId === hoveredCreature.familyId);
                    }
                }

                c.draw(isHighlighted); 

                // 分裂（クローン）処理
                if (c.hp >= 15) {
                    c.hp -= 5; 

                    const angle = Math.random() * Math.PI * 2;
                    const offset = c.radius * 1.5; 
                    let cloneX = c.x + Math.cos(angle) * offset;
                    let cloneY = c.y + Math.sin(angle) * offset;

                    cloneX = Math.max(c.radius, Math.min(canvas.width - c.radius, cloneX));
                    cloneY = Math.max(c.radius, Math.min(canvas.height - c.radius, cloneY));

                    // 親のIDを託して新規個体を生成
                    const clone = new Creature(cloneX, cloneY, c.genes.rock, c.genes.scissors, c.genes.paper, c.familyId, c.id);

                    const mutationRate = parseFloat(mutRateSlider.value) / 100;
                    if (Math.random() < mutationRate) {
                        const mutationAmount = parseFloat(mutAmtSlider.value) / 100;
                        clone.mutate(mutationAmount); 
                    }

                    nextCreatures.push(clone);
                }

                if (c.hp > 0) {
                    nextCreatures.push(c);
                }
            }

            creatures = nextCreatures;

            if (timeScale > 0) {
                handleCollisions();
            }

            countBadge.textContent = creatures.length;

            updateStatusPanel();

            requestAnimationFrame(loop);
        }

        loop();
    </script>
</body>
